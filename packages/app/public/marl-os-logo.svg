  <path d="M405 10 L405 45 L440 45 L440 10 Z M415 20 L415 35 L430 35 L430 20 Z" fill="#F5D03A" stroke="#2D2D2D" stroke-width="2" stroke-linejoin="round" fill-rule="evenodd"/>

